name: Create Hotfix Sync-Back PR

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync-back:
    if: >
      github.event.pull_request.merged == true &&
      (github.event.pull_request.base.ref == 'staging' || github.event.pull_request.base.ref == 'production')

    runs-on: ubuntu-latest

    concurrency:
      group: hotfix-sync-back-${{ github.event.pull_request.number }}
      cancel-in-progress: false

    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      SOURCE_BRANCH: ${{ github.event.pull_request.head.ref }}
      SOURCE_BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
      ACTOR: ${{ github.actor }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitHub CLI
        shell: bash
        run: |
          set -e

          REQUIRED_VERSION="2.89.0"

          if command -v gh >/dev/null 2>&1; then
            INSTALLED_VERSION=$(gh --version | head -n1 | awk '{print $3}')
            echo "Found gh version: $INSTALLED_VERSION"

            if [ "$INSTALLED_VERSION" = "$REQUIRED_VERSION" ]; then
              echo "Correct version already installed. Skipping."
              exit 0
            else
              echo "Different version installed. Upgrading to $REQUIRED_VERSION..."
            fi
          else
            echo "gh not found. Installing version $REQUIRED_VERSION..."
          fi

          # Install pinned version (Linux amd64) without sudo
          curl -fsSL "https://github.com/cli/cli/releases/download/v${REQUIRED_VERSION}/gh_${REQUIRED_VERSION}_linux_amd64.tar.gz" \
            | tar -xz --strip-components=2 -C "$RUNNER_TEMP" "gh_${REQUIRED_VERSION}_linux_amd64/bin/gh"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

          echo "Final gh version:"
          "$RUNNER_TEMP/gh" --version

      - name: Create sync branch and cherry-pick
        id: cherry-pick
        shell: bash
        run: |
          set -euo pipefail

          # в”Ђв”Ђ helpers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          require_env() {
            local name="$1"
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required environment variable: $name" >&2
              exit 1
            fi
          }

          sanitize_branch_fragment() {
            printf '%s' "$1" | tr '/[:space:]' '-' | tr -cd '[:alnum:]._-' | tr -s '-'
          }

          ensure_label() {
            local name="$1"
            local color="$2"
            local description="$3"

            if gh api "repos/$GITHUB_REPOSITORY/labels/$name" >/dev/null 2>&1; then
              return 0
            fi

            gh api "repos/$GITHUB_REPOSITORY/labels" \
              --method POST \
              -f name="$name" \
              -f color="$color" \
              -f description="$description" >/dev/null
          }

          # в”Ђв”Ђ validation в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          require_env "GH_TOKEN"
          require_env "GITHUB_REPOSITORY"
          require_env "PR_NUMBER"
          require_env "PR_TITLE"
          require_env "PR_URL"
          require_env "SOURCE_BRANCH"
          require_env "SOURCE_BASE_BRANCH"

          # в”Ђв”Ђ routing в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          case "$SOURCE_BASE_BRANCH" in
            staging)
              TARGET_BRANCH="main"
              TARGET_LABEL="sync-to-main"
              ;;
            production)
              TARGET_BRANCH="staging"
              TARGET_LABEL="sync-to-staging"
              ;;
            *)
              echo "Merged PR does not target staging or production. No sync-back is required."
              echo "should_create_pr=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          OWNER="${GITHUB_REPOSITORY%%/*}"
          SANITIZED_SOURCE_BRANCH="$(sanitize_branch_fragment "$SOURCE_BRANCH")"
          SYNC_BRANCH="sync-back/${SOURCE_BASE_BRANCH}-to-${TARGET_BRANCH}/pr-${PR_NUMBER}-${SANITIZED_SOURCE_BRANCH}"
          COMMITS_FILE="$(mktemp)"
          BODY_FILE="$(mktemp)"

          # в”Ђв”Ђ fetch PR commits в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          echo "Loading commits for PR #$PR_NUMBER"
          gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/commits" --paginate --jq '.[].sha' > "$COMMITS_FILE"

          if [[ ! -s "$COMMITS_FILE" ]]; then
            echo "No commits were returned for PR #$PR_NUMBER." >&2
            exit 1
          fi

          # в”Ђв”Ђ idempotency check в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          existing_open_pr_url="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --base "$TARGET_BRANCH" \
            --head "$OWNER:$SYNC_BRANCH" \
            --json url \
            --jq '.[0].url // ""')"

          if [[ -n "$existing_open_pr_url" ]]; then
            echo "An open sync-back PR already exists: $existing_open_pr_url"
            echo "should_create_pr=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # в”Ђв”Ђ ensure labels exist в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          ensure_label "sync-back"     "1d76db" "Automated branch synchronization pull request"
          ensure_label "$TARGET_LABEL" "0e8a16" "Automated sync-back PR targeting $TARGET_BRANCH"

          # в”Ђв”Ђ git setup в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch --no-tags origin \
            "+refs/heads/$TARGET_BRANCH:refs/remotes/origin/$TARGET_BRANCH" \
            "+refs/pull/$PR_NUMBER/head:refs/remotes/origin/pull/$PR_NUMBER/head"

          git checkout -B "$SYNC_BRANCH" "origin/$TARGET_BRANCH"

          # в”Ђв”Ђ cherry-pick loop в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          applied_commits=0
          skipped_commits=0
          conflicted_commits=()

          while IFS= read -r commit_sha; do
            [[ -z "$commit_sha" ]] && continue

            if ! git cat-file -e "$commit_sha^{commit}" 2>/dev/null; then
              echo "Commit $commit_sha is not available locally after fetching the PR ref." >&2
              exit 1
            fi

            parent_count="$(git rev-list --parents -n 1 "$commit_sha" | awk '{ print NF - 1 }')"
            if [[ "$parent_count" -gt 1 ]]; then
              echo "Commit $commit_sha is a merge commit and cannot be cherry-picked automatically." >&2
              exit 1
            fi

            if git cherry-pick -x "$commit_sha"; then
              applied_commits=$((applied_commits + 1))
              continue
            fi

            if [[ -z "$(git status --porcelain)" ]]; then
              echo "Commit $commit_sha is already present on $TARGET_BRANCH. Skipping it."
              git cherry-pick --skip || true
              skipped_commits=$((skipped_commits + 1))
              continue
            fi

            if git diff --name-only --diff-filter=U | grep -q '.'; then
              echo "Cherry-pick conflict on $commit_sha. Staging conflict markers and continuing..."
              git add -A
              GIT_EDITOR=true git cherry-pick --continue
              conflicted_commits+=("$commit_sha")
              applied_commits=$((applied_commits + 1))
              continue
            fi

            git cherry-pick --abort || true
            echo "Cherry-pick failed for $commit_sha for an unexpected reason." >&2
            exit 1
          done < "$COMMITS_FILE"

          # в”Ђв”Ђ skip if nothing to sync в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          if [[ "$applied_commits" -eq 0 ]]; then
            echo "All PR commits are already present on $TARGET_BRANCH. No sync PR is required."
            echo "should_create_pr=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # в”Ђв”Ђ unstage commits so peter-evans can detect the changes в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          # Reset the local branch pointer back to origin/TARGET_BRANCH while
          # keeping all cherry-picked file changes in the working tree (--mixed).
          # peter-evans will then stage, commit, push, and open the PR.
          git reset --mixed "origin/$TARGET_BRANCH"

          # в”Ђв”Ђ resolve labels string в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          LABELS="sync-back,$TARGET_LABEL"
          if [[ "${#conflicted_commits[@]}" -gt 0 ]]; then
            ensure_label "needs-manual-resolution" "e4e669" "PR contains conflict markers that require manual resolution"
            LABELS="$LABELS,needs-manual-resolution"
          fi

          # в”Ђв”Ђ PR title в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          SYNC_PR_TITLE="[sync-back][$SOURCE_BASE_BRANCH->$TARGET_BRANCH] $PR_TITLE (#$PR_NUMBER)"

          # в”Ђв”Ђ PR body в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          {
            if [[ "${#conflicted_commits[@]}" -gt 0 ]]; then
              echo "> [!WARNING]"
              echo "> This PR contains **${#conflicted_commits[@]} commit(s) with conflict markers** that require manual resolution before merging."
              echo
            fi

            echo "## Automated Sync-Back"
            echo
            echo "This PR was generated automatically after #$PR_NUMBER was merged into \`$SOURCE_BASE_BRANCH\`."
            echo
            echo "- Original PR: #$PR_NUMBER"
            echo "- Original PR URL: $PR_URL"
            echo "- Original source branch: \`$SOURCE_BRANCH\`"
            echo "- Sync route: \`$SOURCE_BASE_BRANCH\` -> \`$TARGET_BRANCH\`"
            echo "- Cherry-picked commits applied here: $applied_commits"
            echo "- Commits already present on target: $skipped_commits"
            echo
            echo "### Cherry-Picked Commits"
            while IFS= read -r commit_sha; do
              [[ -n "$commit_sha" ]] && echo "- \`$commit_sha\`"
            done < "$COMMITS_FILE"

            if [[ "${#conflicted_commits[@]}" -gt 0 ]]; then
              echo
              echo "### Commits Requiring Manual Resolution"
              echo
              echo "The following commits were applied with conflict markers. Resolve them before merging:"
              echo
              for sha in "${conflicted_commits[@]}"; do
                echo "- \`$sha\`"
              done
            fi
          } > "$BODY_FILE"

          # в”Ђв”Ђ write outputs в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          COMMIT_MSG="sync-back: cherry-pick PR #${PR_NUMBER} (${SOURCE_BASE_BRANCH} -> ${TARGET_BRANCH})"

          {
            echo "should_create_pr=true"
            echo "sync_branch=$SYNC_BRANCH"
            echo "target_branch=$TARGET_BRANCH"
            echo "labels=$LABELS"
            echo "pr_title=$SYNC_PR_TITLE"
            echo "commit_message=$COMMIT_MSG"
            echo "pr_body<<PR_BODY_EOF"
            cat "$BODY_FILE"
            echo "PR_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Cherry-pick complete. Handing off to peter-evans for push + PR creation."
          echo "  Sync branch : $SYNC_BRANCH"
          echo "  Base branch : $TARGET_BRANCH"
          echo "  Applied     : $applied_commits commit(s)"
          echo "  Skipped     : $skipped_commits commit(s)"
          echo "  Conflicts   : ${#conflicted_commits[@]} commit(s)"

      - name: Create sync-back PR
        id: create-pr
        if: steps.cherry-pick.outputs.should_create_pr == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: ${{ steps.cherry-pick.outputs.commit_message }}
          branch: ${{ steps.cherry-pick.outputs.sync_branch }}
          base: ${{ steps.cherry-pick.outputs.target_branch }}
          title: ${{ steps.cherry-pick.outputs.pr_title }}
          body: ${{ steps.cherry-pick.outputs.pr_body }}
          labels: ${{ steps.cherry-pick.outputs.labels }}

      - name: Notify via ntfy
        if: always()
        shell: bash
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          JOB_STATUS: ${{ job.status }}
          SHOULD_CREATE_PR: ${{ steps.cherry-pick.outputs.should_create_pr }}
          SYNC_PR_TITLE: ${{ steps.cherry-pick.outputs.pr_title }}
          SYNC_BRANCH: ${{ steps.cherry-pick.outputs.sync_branch }}
          OUTPUT_TARGET_BRANCH: ${{ steps.cherry-pick.outputs.target_branch }}
          CREATED_PR_URL: ${{ steps.create-pr.outputs.pull-request-url }}
        run: |
          set -euo pipefail

          if [[ -z "${NTFY_TOPIC:-}" ]]; then
            echo "NTFY_TOPIC secret is not set. Skipping notification."
            exit 0
          fi

          # No-op: all commits already present вЂ” nothing was synced, skip silently
          if [[ "$JOB_STATUS" == "success" && "${SHOULD_CREATE_PR:-false}" == "false" ]]; then
            echo "No sync PR was required. Skipping notification."
            exit 0
          fi

          if [[ "$JOB_STATUS" == "success" ]]; then
            TITLE="[sync-back] PR created"
            TAGS="white_check_mark"
            PRIORITY="default"
            BODY="${SYNC_PR_TITLE}"$'\n'"Route: ${SOURCE_BASE_BRANCH} -> ${OUTPUT_TARGET_BRANCH}"$'\n'"${CREATED_PR_URL:-}"
          else
            TITLE="[sync-back] FAILED вЂ” PR #${PR_NUMBER}"
            TAGS="rotating_light"
            PRIORITY="high"
            BODY="Source PR #${PR_NUMBER} merged into ${SOURCE_BASE_BRANCH}"$'\n'"Branch: ${SOURCE_BRANCH}"$'\n'"Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          fi

          curl -s \
            -H "Title: $TITLE" \
            -H "Priority: $PRIORITY" \
            -H "Tags: $TAGS" \
            -d "$BODY" \
            "https://ntfy.sh/$NTFY_TOPIC" > /dev/null

          echo "ntfy notification sent (job status: $JOB_STATUS)"
